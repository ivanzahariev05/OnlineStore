<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nutriboost</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h1>Login</h1>
    <form class="form-container" th:action="@{/login}" th:object="${loginRequest}" method="post">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Enter your username" required>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="errors"></p>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="errors"></p>

        </div>

        <button type="submit">Login</button>
    </form>
</div>

<footer>
    Copyright &copy; 2025 Nutriboost
</footer>
</body>
</html>
