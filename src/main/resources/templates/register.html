<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nutriboost</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="register-container">
    <h1>Register</h1>
    <form class="form-container" th:action="@{/register}" th:method="post" th:object="${registerRequest}" method="post">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Enter your username" required>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username} " class="errors"></p>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Enter your email" required>

        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Enter your password" required>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"  class="errors"></p>
        </div>

        <button type="submit">Register</button>
        <p class="form-footer-text">Already have an account ? <a href="/login">Sign in</a></p>
    </form>
</div>
<footer>
    Copyright &copy; 2025 Nutriboost
</footer>
</body>
</html>
